<!DOCTYPE html>
<html>
<head>
    <title>ARG Normal VER</title>
    <script>
        // Create audio context
        var audioContext = new (window.AudioContext || window.webkitAudioContext)();

        // Function to play audio
        function playSound(url) {
            fetch(url)
                .then(response => response.arrayBuffer())
                .then(data => audioContext.decodeAudioData(data))
                .then(buffer => {
                    var source = audioContext.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioContext.destination);
                    source.start(0);
                });
        }

        // Function to handle success
        function handleSuccess() {
            playSound('success-sound.mp3'); // Path to success sound
            // Additional success logic here
            alert('Success!');
        }

        // Function to handle error
        function handleError() {
            playSound('error-sound.mp3'); // Path to error sound
            // Additional error logic here
            alert('Error occurred!');
        }
    </script>
</head>
<body>
    <h1>ARG Normal VER</h1>
    <button onclick="handleSuccess()">Test Success</button>
    <button onclick="handleError()">Test Error</button>
</body>
</html>
